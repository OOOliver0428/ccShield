<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">ccShield golden retriever knight product mark</title>
  <desc id="desc">A simplified vector product mark based on a golden retriever in three-quarter view wearing medieval plate armor with a red heraldic shield.</desc>
  <defs>
    <linearGradient id="goldFur" x1="0.1" y1="0.05" x2="0.9" y2="1">
      <stop offset="0" stop-color="#FFD98D"/>
      <stop offset="0.55" stop-color="#E6A84C"/>
      <stop offset="1" stop-color="#BC6F2D"/>
    </linearGradient>
    <linearGradient id="creamFur" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#FFF1BE"/>
      <stop offset="1" stop-color="#E9B85F"/>
    </linearGradient>
    <linearGradient id="steel" x1="0.08" y1="0" x2="0.92" y2="1">
      <stop offset="0" stop-color="#F0F3F5"/>
      <stop offset="0.36" stop-color="#B8C0C5"/>
      <stop offset="0.68" stop-color="#818B92"/>
      <stop offset="1" stop-color="#59636A"/>
    </linearGradient>
    <linearGradient id="steelLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#A9B2B8"/>
    </linearGradient>
    <linearGradient id="leather" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8C5B3C"/>
      <stop offset="1" stop-color="#543521"/>
    </linearGradient>
    <filter id="markShadow" x="-18%" y="-18%" width="136%" height="145%">
      <feDropShadow dx="0" dy="18" stdDeviation="13" flood-color="#172231" flood-opacity="0.17"/>
    </filter>
    <style>
      .ink { stroke: #282827; stroke-linecap: round; stroke-linejoin: round; }
      .detail { fill: none; stroke: #485057; stroke-linecap: round; stroke-linejoin: round; }
      .fur-line { fill: none; stroke: #875427; stroke-linecap: round; }
    </style>
  </defs>

  <g filter="url(#markShadow)">
    <!-- Rear leather straps visible between the fur and plate. -->
    <path d="M278 533 C247 610 245 724 291 815 L349 789 C316 701 320 623 350 556Z" fill="url(#leather)" class="ink" stroke-width="16"/>
    <path d="M721 522 C759 604 763 717 717 812 L659 784 C690 696 685 611 650 548Z" fill="url(#leather)" class="ink" stroke-width="16"/>

    <!-- Broad but simplified armor silhouette. -->
    <path
      d="M170 817 C177 681 245 563 355 522 C396 563 414 645 408 748 L379 900 C302 890 231 861 170 817Z"
      fill="url(#steel)" class="ink" stroke-width="20"
    />
    <path
      d="M854 817 C847 681 779 563 669 522 C628 563 610 645 616 748 L645 900 C722 890 793 861 854 817Z"
      fill="url(#steel)" class="ink" stroke-width="20"
    />
    <path
      d="M310 587 C356 548 418 526 512 526 C606 526 668 548 714 587 L686 896 C625 932 568 950 512 964 C456 950 399 932 338 896Z"
      fill="url(#steel)" class="ink" stroke-width="22"
    />

    <!-- Layered pauldrons, reduced to three readable bands. -->
    <path d="M169 721 C179 620 238 544 321 514 C356 530 378 555 391 588 C309 595 245 649 219 742Z" fill="url(#steelLight)" class="ink" stroke-width="19"/>
    <path d="M855 721 C845 620 786 544 703 514 C668 530 646 555 633 588 C715 595 779 649 805 742Z" fill="url(#steelLight)" class="ink" stroke-width="19"/>
    <path d="M174 748 C237 780 296 790 365 781" class="detail" stroke-width="15"/>
    <path d="M850 748 C787 780 728 790 659 781" class="detail" stroke-width="15"/>
    <path d="M184 801 C244 829 298 838 359 831" class="detail" stroke-width="13"/>
    <path d="M840 801 C780 829 726 838 665 831" class="detail" stroke-width="13"/>
    <path d="M205 662 C249 625 297 608 351 611" fill="none" stroke="#FFFFFF" stroke-width="15" stroke-linecap="round" opacity="0.6"/>
    <path d="M819 662 C775 625 727 608 673 611" fill="none" stroke="#FFFFFF" stroke-width="15" stroke-linecap="round" opacity="0.6"/>

    <!-- Simple engraved scrollwork that survives at medium icon sizes. -->
    <path d="M368 650 C411 622 454 633 468 669 C475 695 455 713 432 702 C417 694 419 677 433 671" class="detail" stroke-width="11"/>
    <path d="M656 650 C613 622 570 633 556 669 C549 695 569 713 592 702 C607 694 605 677 591 671" class="detail" stroke-width="11"/>
    <path d="M365 852 C403 827 441 833 458 861" class="detail" stroke-width="11"/>
    <path d="M659 852 C621 827 583 833 566 861" class="detail" stroke-width="11"/>
    <circle cx="246" cy="682" r="12" fill="#DBE1E4" class="ink" stroke-width="7"/>
    <circle cx="778" cy="682" r="12" fill="#DBE1E4" class="ink" stroke-width="7"/>
    <circle cx="221" cy="760" r="11" fill="#DBE1E4" class="ink" stroke-width="7"/>
    <circle cx="803" cy="760" r="11" fill="#DBE1E4" class="ink" stroke-width="7"/>

    <!-- Far and near ears establish the three-quarter head turn. -->
    <path
      d="M398 205 C336 196 286 238 273 314 C260 390 281 469 326 522 C349 548 381 535 392 499 C414 431 424 277 398 205Z"
      fill="#B76D2E" class="ink" stroke-width="20"
    />
    <path
      d="M632 179 C708 174 772 225 790 311 C809 403 778 500 714 558 C684 585 646 561 640 519 C629 439 616 263 632 179Z"
      fill="#A95E28" class="ink" stroke-width="22"
    />
    <path d="M311 281 C289 351 309 439 354 485" class="fur-line" stroke-width="16" opacity="0.8"/>
    <path d="M703 252 C749 331 732 443 674 510" class="fur-line" stroke-width="18" opacity="0.78"/>

    <!-- Golden retriever head: 45-degree view matching the reference gesture. -->
    <path
      d="M463 116 C488 96 519 101 535 124 C558 105 589 116 596 147 C645 156 685 184 709 228 C741 287 741 367 718 445 C694 524 645 593 575 633 C508 671 429 657 374 610 C325 569 302 511 300 447 C298 396 310 353 334 319 C350 296 371 277 394 258 C411 203 433 151 463 116Z"
      fill="url(#goldFur)" class="ink" stroke-width="22"
    />
    <path d="M410 207 C448 151 519 132 582 150" fill="none" stroke="#FFE6A8" stroke-width="21" stroke-linecap="round" opacity="0.78"/>
    <path d="M659 253 C684 311 683 375 664 430" class="fur-line" stroke-width="13" opacity="0.7"/>
    <path d="M337 430 C325 500 352 556 405 596" class="fur-line" stroke-width="14" opacity="0.65"/>

    <!-- Warm, alert expression with perspective-scaled eyes. -->
    <path d="M365 285 C390 263 422 262 445 281" fill="none" stroke="#76502E" stroke-width="13" stroke-linecap="round"/>
    <path d="M504 260 C538 232 580 237 607 266" fill="none" stroke="#76502E" stroke-width="14" stroke-linecap="round"/>
    <ellipse cx="401" cy="321" rx="30" ry="37" fill="#292725" transform="rotate(-8 401 321)"/>
    <ellipse cx="552" cy="307" rx="40" ry="47" fill="#292725" transform="rotate(6 552 307)"/>
    <ellipse cx="391" cy="307" rx="10" ry="14" fill="#FFF9E9"/>
    <ellipse cx="539" cy="289" rx="14" ry="18" fill="#FFF9E9"/>
    <circle cx="411" cy="335" r="6" fill="#A97342"/>
    <circle cx="568" cy="325" r="8" fill="#A97342"/>

    <!-- Projected muzzle and friendly smile. -->
    <path
      d="M401 343 C349 340 304 373 303 427 C302 489 354 527 423 525 C487 523 544 492 553 438 C562 386 504 349 401 343Z"
      fill="url(#creamFur)" class="ink" stroke-width="17"
    />
    <path
      d="M306 375 C321 351 350 341 375 349 C397 356 411 376 409 397 C401 431 374 449 347 441 C321 433 303 406 306 375Z"
      fill="#302B29" class="ink" stroke-width="9"
    />
    <ellipse cx="350" cy="363" rx="10" ry="7" fill="#807069" opacity="0.75" transform="rotate(12 350 363)"/>
    <path d="M351 440 C351 459 356 474 368 486" fill="none" stroke="#6E452E" stroke-width="10" stroke-linecap="round"/>
    <path d="M368 486 C400 511 451 506 482 468" fill="none" stroke="#5D3828" stroke-width="13" stroke-linecap="round"/>
    <path d="M478 468 C495 457 507 448 517 431" fill="none" stroke="#5D3828" stroke-width="13" stroke-linecap="round"/>
    <path d="M397 505 C421 521 448 519 467 505 C461 536 444 550 425 548 C408 546 398 531 397 505Z" fill="#D27775" stroke="#714242" stroke-width="8"/>

    <!-- A large exposed ruff keeps the armor from feeling enclosing. -->
    <path
      d="M377 514 C402 545 417 575 416 611 L445 590 L466 632 L491 602 L513 646 L538 603 L561 631 L582 588 L608 610 C610 572 622 543 645 515 C625 563 620 602 635 638 C650 676 624 730 570 775 L512 820 L454 775 C399 730 373 676 388 637 C402 599 397 558 377 514Z"
      fill="url(#creamFur)" class="ink" stroke-width="18"
    />
    <path d="M431 651 C448 679 473 697 505 708" class="fur-line" stroke-width="11" opacity="0.65"/>
    <path d="M582 645 C565 677 543 699 516 715" class="fur-line" stroke-width="11" opacity="0.65"/>

    <!-- Narrow collar pieces frame the fur without covering it. -->
    <path d="M343 564 L410 542 L445 632 L384 681Z" fill="url(#steelLight)" class="ink" stroke-width="16"/>
    <path d="M681 564 L614 542 L579 632 L640 681Z" fill="url(#steelLight)" class="ink" stroke-width="16"/>
    <path d="M331 523 L363 512 L385 565 L350 579Z" fill="url(#leather)" class="ink" stroke-width="11"/>
    <path d="M693 523 L661 512 L639 565 L674 579Z" fill="url(#leather)" class="ink" stroke-width="11"/>
    <rect x="343" y="525" width="35" height="30" rx="6" fill="#C2C8CB" class="ink" stroke-width="8" transform="rotate(-17 343 525)"/>
    <rect x="646" y="525" width="35" height="30" rx="6" fill="#C2C8CB" class="ink" stroke-width="8" transform="rotate(17 646 525)"/>

    <!-- Heraldic shield: reduced lion silhouette for small-size legibility. -->
    <path d="M410 711 L512 675 L614 711 L597 861 C574 892 548 912 512 929 C476 912 450 892 427 861Z" fill="#994B4C" class="ink" stroke-width="18"/>
    <path d="M512 700 L588 727 L575 844 C557 868 536 884 512 897 C488 884 467 868 449 844 L436 727Z" fill="none" stroke="#E6C9A1" stroke-width="7" opacity="0.72"/>
    <g fill="#E7C98F" stroke="#282827" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <!-- Upright body and jagged mane. -->
      <path d="M502 760 C485 753 478 738 485 724 L478 716 L491 713 L497 702 L508 710 L520 704 L524 716 C538 719 547 730 547 742 L563 747 L570 759 L552 760 L540 754 C536 764 528 771 518 775 C530 792 532 812 523 831 C512 852 489 860 469 850 C484 842 491 830 488 815 C474 820 461 814 456 802 C471 804 480 797 484 788 C470 785 462 776 463 765 C476 773 491 770 502 760Z"/>
      <!-- Raised forelegs and grounded hind legs make the heraldic pose readable. -->
      <path d="M505 781 L477 796 L464 786" fill="none"/>
      <path d="M519 788 L546 776 L557 786" fill="none"/>
      <path d="M493 840 L475 864 L459 857" fill="none"/>
      <path d="M516 840 L532 865 L548 859" fill="none"/>
      <!-- High curling tail with a small tuft. -->
      <path d="M521 821 C548 813 569 827 570 847 C570 858 564 865 555 867 C560 857 557 848 548 845" fill="none"/>
      <path d="M552 866 L562 858 L566 871Z"/>
      <circle cx="522" cy="728" r="3" fill="#282827" stroke="none"/>
    </g>
  </g>
</svg>
