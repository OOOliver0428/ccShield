<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Cute golden retriever knight logo in three-quarter view</title>
  <desc id="desc">A cute hand-drawn animation-style golden retriever bust in a 45-degree view, wearing light medieval shoulder armor with its face and fluffy chest fully exposed.</desc>
  <defs>
    <linearGradient id="shieldBg" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#F6F8FD"/>
      <stop offset="1" stop-color="#D7E1F2"/>
    </linearGradient>
    <linearGradient id="furGold" x1="0.15" y1="0.05" x2="0.85" y2="1">
      <stop offset="0" stop-color="#FFD985"/>
      <stop offset="0.52" stop-color="#E9AA4B"/>
      <stop offset="1" stop-color="#C97B2D"/>
    </linearGradient>
    <linearGradient id="furLight" x1="0" y1="0" x2="0.75" y2="1">
      <stop offset="0" stop-color="#FFF0B7"/>
      <stop offset="1" stop-color="#F3C56D"/>
    </linearGradient>
    <linearGradient id="armor" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#EEF3F7"/>
      <stop offset="0.5" stop-color="#B6C2CF"/>
      <stop offset="1" stop-color="#7E8EA1"/>
    </linearGradient>
    <linearGradient id="armorShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#AAB7C5"/>
      <stop offset="1" stop-color="#647588"/>
    </linearGradient>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="15" stdDeviation="13" flood-color="#28384F" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- Softer shield silhouette for a friendly security product mark. -->
  <path
    d="M512 66 C652 85 782 132 856 205 L830 564 C817 739 703 864 512 947 C321 864 207 739 194 564 L168 205 C242 132 372 85 512 66Z"
    fill="url(#shieldBg)"
    stroke="#34465F"
    stroke-width="22"
    stroke-linejoin="round"
    filter="url(#logoShadow)"
  />
  <path
    d="M512 101 C628 118 739 155 806 218 L783 548 C772 687 682 792 512 869 C342 792 252 687 241 548 L218 218 C285 155 396 118 512 101Z"
    fill="none"
    stroke="#91A7D2"
    stroke-width="9"
    stroke-linejoin="round"
    opacity="0.7"
  />

  <!-- Light armor only on the shoulders, leaving the neck and chest open. -->
  <path
    d="M192 882 C207 790 262 724 351 696 C389 733 405 790 399 876 C335 900 258 900 192 882Z"
    fill="url(#armor)"
    stroke="#344352"
    stroke-width="19"
    stroke-linejoin="round"
  />
  <path
    d="M832 879 C819 779 756 710 650 686 C620 731 608 793 619 879 C692 902 770 899 832 879Z"
    fill="url(#armor)"
    stroke="#344352"
    stroke-width="19"
    stroke-linejoin="round"
  />
  <path d="M218 814 C268 777 329 766 386 782" fill="none" stroke="#F5F8FA" stroke-width="15" stroke-linecap="round" opacity="0.72"/>
  <path d="M802 806 C751 760 689 751 629 770" fill="none" stroke="#F5F8FA" stroke-width="15" stroke-linecap="round" opacity="0.72"/>
  <path d="M228 860 C277 838 326 833 386 844" fill="none" stroke="#718195" stroke-width="10" stroke-linecap="round"/>
  <path d="M795 856 C745 830 690 825 631 838" fill="none" stroke="#718195" stroke-width="10" stroke-linecap="round"/>
  <circle cx="282" cy="808" r="12" fill="#EAF0F4" stroke="#344352" stroke-width="7"/>
  <circle cx="736" cy="799" r="12" fill="#EAF0F4" stroke="#344352" stroke-width="7"/>

  <!-- Far ear is smaller; near ear is fuller to establish the 45-degree view. -->
  <path
    d="M371 261 C309 259 258 309 253 387 C248 462 275 545 326 598 C350 623 381 609 392 573 C411 510 410 337 371 261Z"
    fill="#B66C2B"
    stroke="#553A2C"
    stroke-width="20"
    stroke-linejoin="round"
  />
  <path
    d="M653 236 C727 224 792 278 805 367 C818 459 790 565 718 635 C685 667 642 645 632 599 C616 523 615 315 653 236Z"
    fill="#A95F27"
    stroke="#553A2C"
    stroke-width="22"
    stroke-linejoin="round"
  />
  <path d="M303 340 C282 413 302 503 351 557" fill="none" stroke="#DA9142" stroke-width="17" stroke-linecap="round" opacity="0.8"/>
  <path d="M728 309 C773 385 753 510 683 579" fill="none" stroke="#D48739" stroke-width="20" stroke-linecap="round" opacity="0.78"/>

  <!-- Asymmetric fluffy head, turned toward the viewer's right. -->
  <path
    d="M478 153 C499 137 521 141 535 162 C553 143 578 150 586 177 C626 182 663 204 687 239 C724 293 735 374 719 455 C703 538 659 613 592 662 C537 702 467 706 407 674 C341 639 302 575 286 496 C266 397 286 300 350 225 C382 188 427 165 478 153Z"
    fill="url(#furGold)"
    stroke="#553A2C"
    stroke-width="22"
    stroke-linejoin="round"
  />
  <path d="M386 247 C433 196 503 179 563 194" fill="none" stroke="#FFE39B" stroke-width="22" stroke-linecap="round" opacity="0.77"/>
  <path d="M325 470 C318 538 349 599 406 638" fill="none" stroke="#BE742D" stroke-width="15" stroke-linecap="round" opacity="0.6"/>
  <path d="M682 456 C675 531 638 594 585 631" fill="none" stroke="#B76829" stroke-width="16" stroke-linecap="round" opacity="0.62"/>

  <!-- Cute, alert eyes: the near eye is larger and rounder. -->
  <path d="M366 358 C393 336 427 335 451 352" fill="none" stroke="#74502F" stroke-width="14" stroke-linecap="round"/>
  <path d="M548 339 C584 312 628 314 659 340" fill="none" stroke="#74502F" stroke-width="15" stroke-linecap="round"/>
  <ellipse cx="411" cy="397" rx="35" ry="40" fill="#312B29" transform="rotate(-7 411 397)"/>
  <ellipse cx="601" cy="385" rx="46" ry="51" fill="#312B29" transform="rotate(7 601 385)"/>
  <ellipse cx="399" cy="383" rx="12" ry="15" fill="#FFF9E9"/>
  <ellipse cx="586" cy="366" rx="16" ry="19" fill="#FFF9E9"/>
  <circle cx="423" cy="415" r="7" fill="#C5864B" opacity="0.7"/>
  <circle cx="617" cy="407" r="9" fill="#C5864B" opacity="0.7"/>

  <!-- Muzzle is shifted right with the perspective, keeping a soft puppy shape. -->
  <path
    d="M548 423 C493 412 430 443 420 505 C408 578 463 632 535 637 C610 642 674 598 679 526 C684 461 621 424 548 423Z"
    fill="url(#furLight)"
    stroke="#704B31"
    stroke-width="17"
    stroke-linejoin="round"
  />
  <path
    d="M527 456 C543 438 570 432 593 441 C612 448 626 464 629 481 C619 514 592 532 563 527 C537 522 521 495 527 456Z"
    fill="#322C2B"
    stroke="#553A2C"
    stroke-width="10"
    stroke-linejoin="round"
  />
  <ellipse cx="580" cy="455" rx="11" ry="7" fill="#76635B" opacity="0.72" transform="rotate(15 580 455)"/>
  <path d="M561 526 C558 545 558 555 562 567" fill="none" stroke="#70452F" stroke-width="11" stroke-linecap="round"/>
  <path d="M562 567 C535 591 503 584 488 564" fill="none" stroke="#70452F" stroke-width="11" stroke-linecap="round"/>
  <path d="M562 567 C588 589 620 581 636 559" fill="none" stroke="#70452F" stroke-width="11" stroke-linecap="round"/>
  <path d="M526 594 C549 611 579 610 603 591 C598 626 581 645 559 645 C541 643 527 625 526 594Z" fill="#D87877" stroke="#7A4544" stroke-width="9" stroke-linejoin="round"/>
  <path d="M543 613 C556 620 570 619 584 611" fill="none" stroke="#F4ACAA" stroke-width="6" stroke-linecap="round"/>

  <!-- Small cheek tufts and blush soften the silhouette. -->
  <path d="M303 506 C283 520 286 544 311 552 C291 570 304 594 331 588" fill="none" stroke="#553A2C" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M702 480 C723 495 720 519 696 529 C716 544 706 568 680 567" fill="none" stroke="#553A2C" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="382" cy="492" rx="28" ry="13" fill="#D77C55" opacity="0.32" transform="rotate(-11 382 492)"/>
  <ellipse cx="650" cy="477" rx="31" ry="14" fill="#D77C55" opacity="0.32" transform="rotate(9 650 477)"/>

  <!-- Large exposed chest ruff; armor remains secondary. -->
  <path
    d="M392 648 C424 674 444 700 451 735 L481 711 L502 759 L525 715 L552 748 C566 704 586 678 618 651 C597 681 590 715 600 748 C613 792 590 854 536 904 L503 934 L474 902 C416 850 393 791 408 744 C418 711 411 678 392 648Z"
    fill="url(#furLight)"
    stroke="#553A2C"
    stroke-width="18"
    stroke-linejoin="round"
  />
  <path d="M455 784 C472 806 489 820 506 828 C523 813 540 792 552 766" fill="none" stroke="#E3A84E" stroke-width="12" stroke-linecap="round" opacity="0.65"/>

  <!-- A narrow leather-and-steel clasp ties the knight theme together. -->
  <path d="M397 713 C431 733 462 744 493 747" fill="none" stroke="#536BA8" stroke-width="22" stroke-linecap="round"/>
  <path d="M531 746 C566 740 596 728 626 706" fill="none" stroke="#536BA8" stroke-width="22" stroke-linecap="round"/>
  <path d="M512 734 L554 763 L542 829 L512 851 L482 829 L470 763Z" fill="url(#armorShade)" stroke="#344352" stroke-width="14" stroke-linejoin="round"/>
  <path d="M512 758 L535 775 L528 814 L512 826 L496 814 L489 775Z" fill="#AFC2EB"/>
</svg>
