name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-portable:
    name: Windows x64 portable
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build bundled frontend
        working-directory: frontend
        run: bun run build

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: latest
          working-directory: backend
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.11
        working-directory: backend
        run: uv python install 3.11

      - name: Install release dependencies
        working-directory: backend
        run: uv sync --extra release --python 3.11

      - name: Verify tag and project versions
        env:
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: uv run --project backend python scripts/check_version.py --tag "$env:EXPECTED_VERSION"

      - name: Build PyInstaller onedir bundle
        run: uv run --project backend --python 3.11 pyinstaller packaging/ccshield.spec --noconfirm --clean

      - name: Add release documentation
        shell: pwsh
        run: |
          Copy-Item LICENSE dist/ccShield/LICENSE.txt
          Copy-Item packaging/RELEASE-README.txt dist/ccShield/README.txt

      - name: Smoke-test packaged executable
        shell: pwsh
        run: |
          & .\dist\ccShield\ccShield.exe `
            --smoke-test `
            --no-browser `
            --port 18765 `
            --data-dir "$env:RUNNER_TEMP\ccshield-smoke"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Create ZIP and SHA-256
        id: package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          $archive = "ccShield-${{ github.ref_name }}-windows-x64.zip"
          $archivePath = Join-Path release-artifacts $archive
          Compress-Archive -Path dist/ccShield -DestinationPath $archivePath -CompressionLevel Optimal
          $hash = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLowerInvariant()
          "$hash  $archive" | Set-Content -NoNewline -Encoding ascii "$archivePath.sha256"
          "archive=$archivePath" >> $env:GITHUB_OUTPUT
          "checksum=$archivePath.sha256" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ccShield-${{ github.ref_name }}-windows-x64
          path: release-artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" `
            "${{ steps.package.outputs.archive }}" `
            "${{ steps.package.outputs.checksum }}" `
            --verify-tag `
            --title "ccShield ${{ github.ref_name }}" `
            --notes-file packaging/release-notes.md
