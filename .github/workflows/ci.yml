name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (saves CI minutes on rapid pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend (ruff + basedpyright + pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: latest
          working-directory: backend
          # uv's built-in cache keyed on uv.lock / pyproject.toml changes
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies (incl. dev extras)
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Basedpyright type check
        run: uv run basedpyright

      # NOTE: -m "not live" future-proofs CI once @pytest.mark.live tests are
      # added (T26-style integration tests against a real Bilibili Cookie).
      # Today no `live` marker is registered in pyproject.toml, and addopts
      # includes --strict-markers — this -m expression will therefore error
      # until the marker is registered. Tracking: leave as-is to gate CI on
      # the marker being properly declared.
      - name: Pytest (exclude live tests)
        run: uv run pytest -m "not live" -v --junitxml=pytest-results.xml

      - name: Report pytest failure details
        if: failure()
        run: uv run python ../scripts/report_pytest_failures.py pytest-results.xml

      # Project-wide coverage floor (70%). Per-module 80% is enforced locally
      # per-task; CI uses a single project gate to keep the signal simple.
      - name: Pytest with coverage (project floor 70%)
        run: uv run pytest --cov=app --cov-report=xml --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: warn

  frontend:
    name: frontend (typecheck + lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Typecheck (vue-tsc)
        run: bun run typecheck

      - name: Lint (eslint, max-warnings 0)
        run: bun run lint

      - name: Test (vitest run)
        run: bun run test

      # bun run build = vue-tsc --noEmit && vite build (already typechecked,
      # but we keep it explicit per package.json contract).
      - name: Build (vite)
        run: bun run build

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: warn
          retention-days: 7

  secrets-scan:
    name: secrets scan (T26)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # T26 deliverable. Script lives at scripts/check_secrets.sh.
      # Must exit 0 on a clean tree; non-zero blocks this job.
      - name: Run secrets scan
        run: bash scripts/check_secrets.sh

  # Catches backend→frontend contract drift: a PR that changes a backend
  # route without re-running scripts/gen_schema.sh + scripts/gen_client.sh
  # will leave frontend/openapi.json or frontend/src/api/generated/ stale
  # vs HEAD, failing this job.
  openapi-stale:
    name: openapi-stale (T25)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: latest
          working-directory: backend
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend deps
        working-directory: backend
        run: uv sync --extra dev

      - name: Install frontend deps (incl. @hey-api/openapi-ts)
        working-directory: frontend
        run: bun install --frozen-lockfile

      # CI runners never share :8000 with a developer listener, but pick a
      # non-default port to stay safe on shared self-hosted runners.
      - name: Fetch backend OpenAPI schema
        env:
          RECCSHIELD_GEN_PORT: "8765"
        run: bash scripts/gen_schema.sh

      - name: Regenerate TS client from committed schema
        run: bash scripts/gen_client.sh

      # `git diff --exit-code` returns 1 if either file differs from HEAD —
      # i.e. a backend route changed but the regenerated artifacts were not
      # committed. Fails the job, blocking merge.
      - name: Diff openapi.json and generated client
        run: |
          set -euo pipefail
          # --exit-code makes git diff exit 1 on any diff vs HEAD (index).
          # We diff against the index (not working-tree vs working-tree)
          # so a successful prior `git add` by CI's own checkout is the
          # baseline. CI's checkout does NOT stage these files, so this
          # is effectively "files differ from committed version".
          git diff --exit-code -- frontend/openapi.json frontend/src/api/generated/ \
            && echo "openapi-stale: clean — generated artifacts match HEAD."

      - name: Upload regenerated artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: openapi-stale-diff
          path: |
            frontend/openapi.json
            frontend/src/api/generated
          if-no-files-found: warn
          retention-days: 3
