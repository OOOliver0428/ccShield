name: 功能建议
description: 提议新的房管工作流或体验改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 谁会在什么情况下使用这个功能？
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 当前问题
      description: 现有流程为什么不能满足需求？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述期望的交互、输入、输出和异常处理。
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: 风险与边界
      description: 是否涉及真实账号、房管写操作、隐私信息、平台接口或兼容性？
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已搜索现有 Issue，未发现相同建议。
          required: true
        - label: 本建议不要求维护者在未经确认的情况下对真实用户执行房管操作。
          required: true
