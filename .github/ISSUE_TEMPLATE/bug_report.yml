name: Bug 报告
description: 报告可复现的功能缺陷或异常行为
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请先移除日志、截图中的 Cookie、二维码、个人快捷房间和其他账号信息。
  - type: input
    id: version
    attributes:
      label: ccShield 版本
      description: 例如 v2.0.4，或 main 分支提交号。
      placeholder: v2.0.4
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows
        - macOS
        - Linux
        - 其他
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 实际发生了什么？对使用造成了什么影响？
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      placeholder: |
        1. 启动……
        2. 连接……
        3. 点击……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 脱敏后的日志或截图
      description: 可选。请删除 Cookie、二维码、真实 UID、房间配置和其他个人信息。
  - type: checkboxes
    id: safety
    attributes:
      label: 安全确认
      options:
        - label: 我已确认本 Issue 不包含 Cookie、二维码、Token 或个人配置。
          required: true
        - label: 我没有为了复现问题对真实用户执行未经许可的禁言或解禁操作。
          required: true
